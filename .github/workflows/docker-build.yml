name: Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_PREFIX: huynhducphu2502

jobs:
  # ------------------------------------------
  # Step 1: Detect which apps changed
  # ------------------------------------------
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      main: ${{ steps.filter.outputs.main }}
      portal: ${{ steps.filter.outputs.portal }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect path changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            main:
              - 'apps/main/**'
              - 'docker/**'
              - 'package.json'
              - 'package-lock.json'
            portal:
              - 'apps/portal/**'
              - 'docker/**'
              - 'package.json'
              - 'package-lock.json'

  # ------------------------------------------
  # Step 2: Build each app (conditional)
  # ------------------------------------------
  build-main:
    name: Build Main
    needs: detect-changes
    if: needs.detect-changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/tea4life-main
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Main
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/main/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BACKEND_BASE_URL=${{ secrets.VITE_BACKEND_BASE_URL }}

  build-portal:
    name: Build Portal
    needs: detect-changes
    if: needs.detect-changes.outputs.portal == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/tea4life-portal
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Portal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/portal/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BACKEND_BASE_URL=${{ secrets.VITE_BACKEND_BASE_URL }}
